<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food AR Menu</title>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>


<style>

body{

    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;

}


.container{

    max-width:420px;
    margin:auto;
    padding:20px;

}


.card{

    background:white;
    border-radius:20px;
    padding:15px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.15);

}


h2{

    margin-bottom:5px;

}


.price{

    color:#555;
    font-size:18px;

}


model-viewer{

    width:100%;
    height:350px;
    background:#fafafa;

}


button{

    width:100%;
    padding:16px;

    border:none;
    border-radius:14px;

    background:#111;
    color:white;

    font-size:18px;
    cursor:pointer;

}

</style>


</head>


<body>


<div class="container">


<div class="card">


<h2>🍔 Classic Burger</h2>

<p class="price">
₹199
</p>



<model-viewer

id="dish"


src="./output/hamburger_fixed.glb"


camera-controls

auto-rotate


ar

ar-placement="floor"

ar-scale="fixed"


shadow-intensity="1"


>


<button

slot="ar-button"

id="ar-button"

>

View on Table 🍽️

</button>


</model-viewer>



</div>


</div>


</body>


</html>
