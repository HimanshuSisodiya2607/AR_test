<!DOCTYPE html>

<html>

<head>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    font-family:Arial;
}


.card{
    padding:20px;
}


model-viewer{
    width:100%;
    height:500px;
}

</style>


</head>


<body>


<div class="card">

<h1>🍰 Chocolate Cake</h1>

<h2>₹199</h2>


<model-viewer

src="./output/cake_AR_ready.glb"

camera-controls

ar

ar-modes="webxr scene-viewer quick-look"

camera-orbit="0deg 65deg 1m"

min-camera-orbit="-Infinity 65deg auto"

max-camera-orbit="Infinity 65deg auto"

interaction-prompt="auto"

shadow-intensity="1"

environment-image="neutral"


>


<button slot="ar-button">

View On Table

</button>


</model-viewer>


</div>


</body>

</html>
